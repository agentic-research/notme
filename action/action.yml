name: 'notme identity exchange'
description: 'Exchange GHA OIDC token for bridge cert pair (P-256 mTLS + Ed25519 signing). Zero secrets — private keys never leave process memory.'
inputs:
  audience:
    description: 'OIDC audience for the identity exchange'
    default: 'notme.bot'
  authority_url:
    description: 'Authority base URL (for self-hosted or local workerd)'
    default: 'https://auth.notme.bot'
  skip_bridge_cert:
    description: 'Skip identity exchange'
    default: 'false'
  octo_sts_scope:
    description: 'octo-sts scope (org/repo). Empty = skip.'
    default: ''
  octo_sts_identity:
    description: 'octo-sts trust policy identity name'
    default: 'default'
outputs:
  notme_url:
    description: 'Authority URL for subsequent API calls'
  notme_cert:
    description: 'P-256 bridge cert PEM — for mTLS transport auth (public data, useless without the private key held in process memory)'
  notme_signing_cert:
    description: 'Ed25519 bridge cert PEM — for git commit signing and APAS attestations (public data)'
  notme_identity:
    description: 'WIMSE identity URI (wimse://notme.bot/gha/{owner}/{repo})'
  expires_at:
    description: 'Cert expiry (Unix timestamp)'
  github_token:
    description: 'Scoped GitHub token from octo-sts (empty if not requested)'
runs:
  using: 'node20'
  main: 'dist/index.js'
