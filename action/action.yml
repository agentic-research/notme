name: 'notme identity exchange'
description: 'Exchange GHA OIDC token for a signet bridge cert at auth.notme.bot. Zero env vars, zero secrets.'
inputs:
  audience:
    description: 'OIDC audience for the bridge cert request'
    default: 'notme.bot'
  authority_url:
    description: 'Authority base URL (for self-hosted)'
    default: 'https://auth.notme.bot'
  skip_bridge_cert:
    description: 'Skip bridge cert exchange (octo-sts only)'
    default: 'false'
  octo_sts_scope:
    description: 'octo-sts scope (org/repo). Empty = skip.'
    default: ''
  octo_sts_identity:
    description: 'octo-sts trust policy identity name'
    default: 'default'
outputs:
  bridge_cert:
    description: 'Base64-encoded signet bridge cert PEM (5-min TTL)'
  bridge_key:
    description: 'Base64-encoded ephemeral private key PEM'
  bridge_expires_at:
    description: 'Bridge cert expiry (Unix timestamp)'
  github_token:
    description: 'Scoped GitHub token from octo-sts (empty if not requested)'
runs:
  using: 'node20'
  main: 'dist/index.js'
