name: 'notme identity exchange'
description: 'Exchange GHA OIDC token for a DPoP-bound access token. Zero secrets — private keys never leave process memory.'
inputs:
  audience:
    description: 'OIDC audience for the identity exchange'
    default: 'notme.bot'
  authority_url:
    description: 'Authority base URL (for self-hosted or local workerd)'
    default: 'https://auth.notme.bot'
  skip_bridge_cert:
    description: 'Skip identity exchange'
    default: 'false'
  octo_sts_scope:
    description: 'octo-sts scope (org/repo). Empty = skip.'
    default: ''
  octo_sts_identity:
    description: 'octo-sts trust policy identity name'
    default: 'default'
outputs:
  notme_url:
    description: 'Authority URL for subsequent API calls'
  notme_token:
    description: 'DPoP-bound access token — useless without the matching DPoP proof key (which exists only in this steps process memory)'
  notme_jkt:
    description: 'JWK Thumbprint of the DPoP proof key (for verification, not a secret)'
  expires_in:
    description: 'Token lifetime in seconds'
  github_token:
    description: 'Scoped GitHub token from octo-sts (empty if not requested)'
runs:
  using: 'node20'
  main: 'dist/index.js'
