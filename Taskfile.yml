version: "3"

tasks:
  # Root pnpm install — used by any root-scope task that runs `pnpm exec`.
  # --ignore-scripts: never run install hooks (defense-in-depth, matches
  # worker:install + .npmrc posture). --frozen-lockfile: fail on lockfile
  # drift. `sources:` makes Task skip re-running when nothing changed.
  deps:install:
    desc: Install root deps (tsx, yaml, zod) via pnpm
    sources:
      - package.json
      - pnpm-lock.yaml
    cmds:
      - pnpm install --frozen-lockfile --ignore-scripts

  schema:ts:
    desc: Generate TypeScript types + Zod schemas from Cap'n Proto
    deps: [deps:install]
    cmds:
      - pnpm exec tsx schema/codegen/capnp-to-ts.ts schema/identity.capnp > gen/ts/identity.ts
      - echo "Generated gen/ts/identity.ts"

  schema:go:
    desc: Generate Go types from Cap'n Proto
    cmds:
      - capnp compile -o go:gen/go --src-prefix=schema -I "$HOME/go/pkg/mod/capnproto.org/go/capnp/v3@v3.1.0-alpha.2/std" schema/identity.capnp
      - echo "Generated gen/go/identity.capnp.go"

  schema:all:
    desc: Generate all language bindings
    deps: [schema:ts, schema:go]

  schema:check:
    desc: Type-check generated code
    deps: [schema:ts]
    cmds:
      - pnpm exec tsc --noEmit --strict --moduleResolution bundler --module ES2022 --target ES2022 --skipLibCheck gen/ts/identity.ts

  worker:dev:
    desc: Start local dev server
    dir: worker
    cmds:
      - pnpm exec wrangler dev

  worker:install:
    desc: Clean install from lockfile (no scripts)
    dir: worker
    cmds:
      - pnpm install --frozen-lockfile --ignore-scripts

  worker:audit:
    desc: Check for known vulnerabilities
    dir: worker
    cmds:
      - pnpm audit --prod

  worker:check:
    desc: Type-check + test (audit is its own task — `worker:audit`)
    dir: worker
    cmds:
      - pnpm exec tsc --noEmit
      - pnpm exec vitest run

  proxy:check:
    desc: Build + test the Rust mTLS proxy crate
    dir: proxy
    cmds:
      - cargo build --locked
      - cargo test --locked
      - cargo clippy --locked --tests -- -D warnings

  worker:deploy-preview:
    desc: Upload new version without routing traffic to it
    dir: worker
    cmds:
      - pnpm exec wrangler versions upload

  worker:deploy:
    desc: Deploy to production (use ship for the safe path)
    dir: worker
    cmds:
      - pnpm exec wrangler deploy

  worker:rollback:
    desc: Roll back to previous version
    dir: worker
    cmds:
      - pnpm exec wrangler rollback

  worker:verify:
    desc: Smoke test live endpoints
    cmds:
      - |
        FAIL=0
        check() { curl -sf "$1" | grep -q "$2" && echo "✓ $3" || { echo "✗ $3"; FAIL=1; }; }
        echo "=== auth.notme.bot ==="
        check "https://auth.notme.bot/" "identity authority" "landing"
        check "https://auth.notme.bot/login" "passkey" "login"
        check "https://auth.notme.bot/.well-known/signet-authority.json" "issuer" "discovery"
        check "https://auth.notme.bot/.well-known/ca-bundle.pem" "CERTIFICATE" "ca-bundle"
        check "https://auth.notme.bot/.well-known/jwks.json" "Ed25519" "jwks"
        check "https://auth.notme.bot/api/docs" "auth.notme.bot" "api-docs"
        check "https://auth.notme.bot/auth/passkey/status" "rpId" "passkey-status"
        # /authorize without params should 400 (missing redirect_uri), not 404
        STATUS=$(curl -so /dev/null -w "%{http_code}" "https://auth.notme.bot/authorize")
        [ "$STATUS" = "400" ] && echo "✓ authorize (400 without params)" || { echo "✗ authorize (got $STATUS)"; FAIL=1; }
        # /token without DPoP should 400, not 500
        STATUS=$(curl -so /dev/null -w "%{http_code}" -X POST "https://auth.notme.bot/token" -H "Content-Type: application/json" -d '{"audience":"https://test"}')
        [ "$STATUS" = "400" ] && echo "✓ token (400 without DPoP)" || { echo "✗ token (got $STATUS)"; FAIL=1; }
        echo "=== notme.bot ==="
        check "https://notme.bot/" "notme" "homepage"
        check "https://notme.bot/apas" "APAS" "apas"
        echo "---"
        [ $FAIL -eq 0 ] && echo "All checks passed." || { echo "SOME CHECKS FAILED"; exit 1; }

  docs:check:
    desc: Verify doc claims against code
    deps: [deps:install]
    cmds:
      - pnpm exec tsx scripts/doc-check.ts --skip-external

  pin:check:
    desc: Verify every external `uses:` in .github/workflows is SHA-pinned
    deps: [deps:install]
    cmds:
      - pnpm exec tsx scripts/check-sha-pins.ts

  ship:
    desc: "Safe path: install → check → docs → preview → verify instructions"
    cmds:
      - task: worker:install
      - task: worker:check
      - task: docs:check
      - task: worker:deploy-preview
      - echo ""
      - echo "Preview version uploaded. To go live:"
      - echo "  task worker:deploy      # route traffic to new version"
      - echo "  task worker:verify      # smoke test"
      - echo "  task worker:rollback    # if something breaks"

  ship-prod:
    desc: "Full send: install → check → docs → deploy → verify (rollback on failure)"
    cmds:
      - task: worker:install
      - task: worker:check
      - task: docs:check
      - task: worker:deploy
      - task: worker:verify

  worker:build-local:
    desc: Bundle worker for local workerd
    dir: worker
    cmds:
      - pnpm exec esbuild worker.ts --bundle --format=esm --outfile=dist/worker.js --conditions=workerd --external:cloudflare:workers --external:@cloudflare/vitest-pool-workers

  worker:serve:
    desc: Run local identity authority via workerd
    dir: worker
    deps: [worker:build-local]
    cmds:
      - pnpm exec workerd serve config.capnp --experimental

  image:keygen:
    desc: Generate the melange signing key (one-time setup)
    dir: packages
    cmds:
      - melange keygen melange.rsa
    status:
      - test -f packages/melange.rsa
      - test -f packages/melange.rsa.pub

  image:apk:
    desc: Build the notme-app + workerd apks via melange (release-style, signed)
    deps: [worker:build-local, image:keygen]
    vars:
      ARCH:
        sh: uname -m | sed 's/arm64/aarch64/'
    cmds:
      - mkdir -p packages/out
      - |
        melange build packages/melange-notme-app.yaml \
          --arch {{.ARCH}} \
          --signing-key packages/melange.rsa \
          --out-dir packages/out \
          --source-dir worker/
      - |
        melange build packages/melange-workerd.yaml \
          --arch {{.ARCH}} \
          --signing-key packages/melange.rsa \
          --out-dir packages/out

  image:
    desc: Build the notme OCI image via apko (loads to docker via `docker load < packages/notme.tar`)
    deps: [image:apk]
    vars:
      TAG: '{{.TAG | default "0.1.0"}}'
      ARCH:
        sh: uname -m | sed 's/arm64/aarch64/'
    cmds:
      - |
        cd packages && apko build apko-notme.yaml notme:{{.TAG}} notme.tar \
          --keyring-append melange.rsa.pub \
          --arch {{.ARCH}}
      - 'echo "Built packages/notme.tar — load with: docker load < packages/notme.tar"'
