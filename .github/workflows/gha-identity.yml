name: GHA Identity Exchange

# Reusable workflow: one OIDC token → two exchanges.
#
#   1. octo-sts  → scoped GitHub App token   (eliminates stored PATs)
#   2. notme.bot → signed access token        (secretless — no private key on disk)
#
# Usage:
#
#   jobs:
#     identity:
#       uses: agentic-research/notme/.github/workflows/gha-identity.yml@<sha>
#       with:
#         octo_sts_scope: agentic-research/ley-line
#         octo_sts_identity: mache-release
#       permissions:
#         id-token: write
#
#     next-job:
#       needs: identity
#       steps:
#         - env:
#             GH_TOKEN: ${{ needs.identity.outputs.github_token }}
#           run: gh release download ...
#         - name: Use notme identity (DPoP-bound)
#           # NOTE: The DPoP token from the identity job is bound to that job's
#           # ephemeral keypair. For cross-job usage, each job should run the
#           # action independently to get its own DPoP keypair + bound token.
#           # The token alone is proof-of-possession — useless without the key.

on:
  workflow_call:
    inputs:
      octo_sts_scope:
        description: 'octo-sts scope (org/repo). Leave empty to skip GitHub token exchange.'
        required: false
        type: string
        default: ''
      octo_sts_identity:
        description: 'Trust policy identity name (filename without .sts.yaml)'
        required: false
        type: string
        default: 'default'
      bridge_audience:
        description: 'Audience for the OIDC token request'
        required: false
        type: string
        default: 'notme.bot'
      skip_bridge_cert:
        description: 'Set to true to skip identity exchange (octo-sts only)'
        required: false
        type: boolean
        default: false
    outputs:
      github_token:
        description: 'Scoped GitHub token from octo-sts. Empty if octo_sts_scope not provided.'
        value: ${{ jobs.exchange.outputs.github_token }}
      notme_url:
        description: 'Authority URL for subsequent API calls'
        value: ${{ jobs.exchange.outputs.notme_url }}
      notme_token:
        description: 'DPoP-bound access token — useless without the matching proof key'
        value: ${{ jobs.exchange.outputs.notme_token }}
      expires_in:
        description: 'Token lifetime in seconds'
        value: ${{ jobs.exchange.outputs.expires_in }}

jobs:
  exchange:
    name: OIDC Exchange
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      github_token: ${{ steps.octo-sts.outputs.token }}
      notme_url: ${{ steps.signet.outputs.notme_url }}
      notme_token: ${{ steps.signet.outputs.notme_token }}
      expires_in: ${{ steps.signet.outputs.expires_in }}

    steps:
      - name: Exchange OIDC → GitHub token (octo-sts)
        id: octo-sts
        if: inputs.octo_sts_scope != ''
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: ${{ inputs.octo_sts_scope }}
          identity: ${{ inputs.octo_sts_identity }}

      - name: Exchange OIDC → notme access token
        id: signet
        if: '!inputs.skip_bridge_cert'
        uses: agentic-research/notme/action@feat/jwt-sdk-primitives
        with:
          audience: ${{ inputs.bridge_audience }}
          authority_url: https://auth.notme.bot
