# Publish notme-dpop to npmjs.org.
#
# Why this exists: two downstream repos (cloister, canonical-hours) vendored a
# byte-copy of the DPoP SDK because there was no package to depend on. This is
# the step that lets those copies be deleted (notme-18450e / cloister-195e47).
#
# Registry note: this briefly published to GitHub Packages as
# @agentic-research/dpop (v0.1.0). That registry requires authentication to
# INSTALL even for public packages — 401 anonymous — which put a token
# requirement on every consumer, including external resource servers verifying
# notme tokens and every local dev machine. Since a public identity provider's
# verifier SDK wants the widest possible reach, it moved to npmjs.org, where
# anonymous install works and no consumer needs an .npmrc at all.
#
# Unscoped `notme-dpop` rather than `@notme/dpop` deliberately: an unscoped name
# needs no npm org to exist first, removing the last setup step. The GitHub
# Packages copy is left in place but frozen at 0.1.0.
#
# Trigger: push a tag `dpop-v<version>` matching packages/dpop/package.json.
# The version check below fails the run on a mismatch rather than publishing
# something whose tag lies about its contents.
name: publish-dpop

on:
  push:
    tags:
      - "dpop-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token lets npm attach a provenance attestation binding the tarball to
      # this workflow + commit. Consumers can verify the package was built here
      # and not uploaded from someone's laptop.
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # `version` is required — the repo root has no `packageManager` field, so
      # the action cannot infer one. Matches ci.yml.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # The published artifact is the thing under test. Building and testing
      # before publish keeps a broken tarball from reaching consumers, since an
      # npm version is immutable once it lands.
      #
      # Run from worker/, not the repo root: vitest is a devDependency of the
      # worker package only, so `pnpm vitest` at the root resolves to nothing in
      # a clean CI install (it appears to work locally purely through hoisting).
      # worker's vitest config globs ../packages/dpop/__tests__, so this single
      # run covers the SDK's own 67 tests AND proves worker still resolves the
      # package through its bare specifier — a stronger gate than testing the
      # package alone.
      - name: Test (worker suite includes packages/dpop)
        working-directory: worker
        run: pnpm vitest run
      - run: pnpm --filter notme-dpop build

      - name: Tag must match package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#dpop-v}"
          PKG_VERSION="$(node -p "require('./packages/dpop/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME implies $TAG_VERSION but package.json says $PKG_VERSION" >&2
            exit 1
          fi
          echo "version $PKG_VERSION matches tag"

      - name: Publish
        working-directory: packages/dpop
        run: pnpm publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
