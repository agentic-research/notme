name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  # Structural guard: every external `uses:` in any workflow MUST be pinned to
  # a full 40-char commit SHA (with optional `# vX.Y.Z` comment). Branch refs
  # and tag refs are forbidden — both are mutable, and the Trivy/Aqua incident
  # (March 2026) is the load-bearing reason. This job fails any PR that
  # reintroduces a non-SHA-pinned `uses:` line. Local references (`./...`)
  # are exempt.
  #
  # Companion to the immediate fix in PR #13 (gha-identity.yml line 93 had
  # drifted to a branch ref pointing at a since-deleted branch). The check
  # below makes that bug class structurally impossible going forward.
  sha-pin-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Canonical action for this check — parses YAML properly instead of
      # grepping it. We tried a regex-based check first; Copilot caught a
      # `\s` portability bug (GNU extension, silently match-nothing under
      # BSD grep → false-positive "all pass"). Regex-on-YAML is the wrong
      # tool. `zgosalvez/github-actions-ensure-sha-pinned-actions` parses
      # the AST, knows about reusable workflows, composite actions, etc.
      - uses: zgosalvez/github-actions-ensure-sha-pinned-actions@ca46236c6ce584ae24bc6283ba8dcf4b3ec8a066 # v5.0.4

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - run: task worker:install
      - run: task worker:audit
      - run: task worker:check
      - run: task docs:check

  proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Pin a specific stable Rust to keep CI deterministic. The proxy crate
      # uses edition = "2024" so we need 1.85+.
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          workspaces: proxy -> target

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - run: task proxy:check
