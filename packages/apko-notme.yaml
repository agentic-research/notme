# apko-notme.yaml — self-hostable notme identity authority
#
# Run your own identity authority. Same code as auth.notme.bot.
# No Cloudflare account needed. No wrangler. No cloud.
#
#   docker run -p 8788:8788 ghcr.io/agentic-research/notme:latest
#
# Usage:
#   melange build melange-workerd.yaml --arch x86_64 --signing-key melange.rsa --out-dir ./out
#   apko build apko-notme.yaml notme:latest notme.tar --keyring-append melange.rsa.pub

contents:
  repositories:
    - https://packages.wolfi.dev/os
    - ./out  # local melange output
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - ca-certificates-bundle
    - wolfi-baselayout
    - workerd
    - notme-app

accounts:
  groups:
    - groupname: notme
      gid: 1000
  users:
    - username: notme
      uid: 1000
      gid: 1000
  run-as: 1000

environment:
  HOME: /app

paths:
  - path: /app
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /data
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /data/do
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755

entrypoint:
  command: /usr/bin/workerd serve /app/config.capnp --experimental

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.title: notme
  org.opencontainers.image.description: "Self-hostable identity authority — passkeys, bridge certs, APAS"
  org.opencontainers.image.source: https://github.com/agentic-research/notme
  org.opencontainers.image.licenses: Apache-2.0
